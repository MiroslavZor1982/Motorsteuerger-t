name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "19 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-python:
    if: ${{ hashFiles('**/*.py') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none
      - uses: github/codeql-action/analyze@v4

  analyze-javascript:
    if: ${{ hashFiles('**/*.js') != '' || hashFiles('**/*.jsx') != '' || hashFiles('**/*.ts') != '' || hashFiles('**/*.tsx') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
      - uses: github/codeql-action/analyze@v4